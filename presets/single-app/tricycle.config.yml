# Minimal single-app project

project:
  name: "my-app"
  type: "single-app"
  package_manager: "npm"
  base_branch: "main"

apps:
  - name: app
    path: "."
    type: web
    lint: "npm run lint"
    build: "npm run build"

worktree:
  enabled: false

mcp:
  preset: "minimal"

qa:
  enabled: false

# /trc.band epic orchestration: max concurrent sub-issue workers (1-8)
band:
  max_parallel: 3

push:
  require_approval: true
  require_lint: true
  require_tests: false
  pr_target: "main"
  auto_merge: false
  merge_strategy: "squash"

branching:
  style: feature-name

stealth:
  enabled: false
  ignore_target: exclude

constitution:
  root: ".trc/memory/constitution.md"
  per_app: false

context:
  session_start:
    constitution: true
    # files:
    #   - "docs/architecture.md"
