# Express API with Prisma + PostgreSQL

project:
  name: "my-express-api"
  type: "single-app"
  package_manager: "npm"
  base_branch: "main"

apps:
  - name: api
    path: "."
    type: api
    lint: "npm run lint"
    test: "npm run test"
    build: "npm run build"
    dev: "npm run dev"
    port: 3000
    database:
      type: postgres
      container: postgres
      port: 5432
      user: postgres
      default_db: mydb
    migration:
      tool: prisma
      script: ./scripts/migrate-dev.sh

worktree:
  enabled: true
  path_pattern: "../{project}-{branch}"
  db_isolation: true
  env_copy:
    - .env

mcp:
  preset: "backend-only"
  custom:
    prisma:
      command: "npx"
      args: ["prisma", "mcp"]

qa:
  enabled: false

push:
  require_approval: true
  require_lint: true
  require_tests: true
  pr_target: "main"
  auto_merge: false
  merge_strategy: "squash"

constitution:
  root: ".specify/memory/constitution.md"
  per_app: false
