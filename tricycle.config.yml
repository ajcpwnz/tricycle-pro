# Minimal single-app project

project:
  name: "tricycle-pro"
  type: "single-app"
  package_manager: "npm"
  base_branch: "main"

apps:
  - name: cli
    path: "."
    type: cli
    test: "bash tests/run-tests.sh"
    test-blocks: "node --test tests/test-*.js"

branching:
  style: issue-number
  prefix: TRI

workflow:
  blocks:
    specify:
      enable:
        - worktree-setup
      skills:
        - document-writer
    plan:
      skills:
        - document-writer
    implement:
      enable:
        - worktree-cleanup
      skills:
        - code-reviewer
    review:
      skills: []

review:
  profiles:
    - quality
    - style
    - security
    - complexity
  sources: []
  report_dir: docs/reviews
  post_to_pr: false

worktree:
  enabled: false

mcp:
  preset: "minimal"

qa:
  enabled: false

push:
  require_approval: true
  require_lint: false
  require_tests: true
  pr_target: "main"
  auto_merge: true
  merge_strategy: "squash"

constitution:
  root: ".trc/memory/constitution.md"
  per_app: false

context:
  session_start:
    constitution: true
