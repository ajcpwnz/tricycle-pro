# Minimal single-app project

project:
  name: "tricycle-pro"
  type: "single-app"
  package_manager: "npm"
  base_branch: "main"

apps:
  - name: cli
    path: "."
    type: cli
    test: "bash tests/run-tests.sh"
    test-blocks: "node --test tests/test-*.js"

branching:
  style: issue-number
  prefix: TRI

workflow:
  blocks:
    specify:
      enable:
        - worktree-setup
      skills:
        - document-writer
    plan:
      skills:
        - document-writer
    implement:
      skills:
        - code-reviewer

mcp:
  preset: "minimal"

qa:
  enabled: false

push:
  require_approval: true
  require_lint: false
  require_tests: true
  pr_target: "main"
  auto_merge: false
  merge_strategy: "squash"

constitution:
  root: ".trc/memory/constitution.md"
  per_app: false
