# Minimal single-app project

project:
  name: "tricycle-pro"
  type: "single-app"
  package_manager: "npm"
  base_branch: "main"

apps:
  - name: cli
    path: "."
    type: cli
    test: "bash tests/run-tests.sh"
    test-blocks: "node --test tests/test-*.js"

branching:
  style: issue-number
  prefix: TRI

workflow:
  blocks:
    specify:
      enable:
        - worktree-setup
      skills:
        - document-writer
    plan:
      skills:
        - document-writer
    implement:
      enable:
        - worktree-cleanup
      skills:
        - code-reviewer
    review:
      skills: []

review:
  profiles:
    - quality
    - style
    - security
    - complexity
  sources: []
  report_dir: docs/reviews
  post_to_pr: false

worktree:
  enabled: false

mcp:
  preset: "minimal"

qa:
  enabled: false

push:
  require_approval: true
  require_lint: false
  require_tests: true
  pr_target: "main"
  auto_merge: true
  merge_strategy: "squash"

constitution:
  root: ".trc/memory/constitution.md"
  per_app: false

context:
  session_start:
    constitution: true

# Optional integration with the graphify skill (https://github.com/safishamsi/graphify).
# All flags default off. Flip `enabled: true` and run `tricycle graphify install` +
# `tricycle graphify bootstrap` once to opt in. See README "Graphify integration".
integrations:
  graphify:
    enabled: false            # master switch for everything in this block
    auto_install: false       # if true, hook may `pip install graphifyy` when missing
    auto_bootstrap: false     # if true, hook may run first-time `graphify .` when no graph exists
    refresh_on_kickoff: true  # run `graphify . --update` async at /trc.specify|/trc.chain|/trc.headless kickoff
    mcp_per_chain: true       # spawn `graphify --mcp` per chain run and pipe endpoint to workers
